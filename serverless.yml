  - serverless-plugin-typescript

package:
  excludeDevDependencies: true
  exclude:
    - .vscode/**
    - '*/**/*.js.map'
    - coverage/**
    - dist/test/**
    - lib/**
    - temp/**
    - test/**
    - .git/**
    - docs/**
    - .github/**
    - .key.txt
    - deploy.txt
