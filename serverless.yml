service: service-anotaai

provider:
  name: aws
  runtime: nodejs18.x
  stage: ${opt:stage, 'dev'}
  deploymentBucket: deploy-bucket-loocal-lambda
  region: us-east-1
  versionFunctions: false

  iamRoleStatements:
    - Effect: "Allow"
      Action:
        - "sqs:*"
      Resource: "*"

functions:
  api:
    description: "API Serverless para integração com AnotaAi"
    handler: src/lambda.handler
    environment:
      DB_USER: ${self:custom.${self:provider.stage}.DB_USER}
      DB_PASSWORD: ${self:custom.${self:provider.stage}.DB_PASSWORD}
      DB_HOST: ${self:custom.${self:provider.stage}.DB_HOST}
      DB_NAME: ${self:custom.${self:provider.stage}.DB_NAME}
      DB_PORT: ${self:custom.${self:provider.stage}.DB_PORT}
      CLIENT_ID: ${self:custom.${self:provider.stage}.CLIENT_ID}
      CLIENT_SECRET: ${self:custom.${self:provider.stage}.CLIENT_SECRET}
      ANOTA_AI_URL: ${self:custom.${self:provider.stage}.ANOTA_AI_URL}
      LOOCAL_API_URL: ${self:custom.${self:provider.stage}.LOOCAL_API_URL}
      TOKEN_LOOCAL: ${self:custom.${self:provider.stage}.TOKEN_LOOCAL}
      URL_LAMBDA_ANOTA_AI: ${self:custom.${self:provider.stage}.URL_LAMBDA_ANOTA_AI}
      GOOGLE_MAPS_API_KEY: ${self:custom.${self:provider.stage}.GOOGLE_MAPS_API_KEY}
    timeout: 60
    memorySize: 256
    events:
      - http:
          path: /
          method: ANY
          cors: true
      - http:
          path: /{proxy+}
          method: ANY
          cors: true

