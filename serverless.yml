service: service-open-delivery

provider:
  name: aws
  runtime: nodejs18.x
  stage: ${opt:stage, 'dev'}
  deploymentBucket: deploy-bucket-loocal-lambda
  region: us-east-1
  versionFunctions: false

  iamRoleStatements:
    - Effect: "Allow"
      Action:
        - "sqs:*"
      Resource: "*"

functions:
  api:
    description: "API Serverless para integração open delivery"
    handler: src/lambda.handler
    environment:
      DB_USER: ${self:custom.${self:provider.stage}.DB_USER}
      DB_PASSWORD: ${self:custom.${self:provider.stage}.DB_PASSWORD}
      DB_HOST: ${self:custom.${self:provider.stage}.DB_HOST}
      DB_NAME: ${self:custom.${self:provider.stage}.DB_NAME}
      DB_PORT: ${self:custom.${self:provider.stage}.DB_PORT}
      JWT_SECRET: ${self:custom.${self:provider.stage}.JWT_SECRET}
      LOOCAL_API_URL: ${self:custom.${self:provider.stage}.LOOCAL_API_URL}
      LOOCAL_LOGIN_EMAIL: ${self:custom.${self:provider.stage}.LOOCAL_LOGIN_EMAIL}
      LOOCAL_LOGIN_PASSWORD: ${self:custom.${self:provider.stage}.LOOCAL_LOGIN_PASSWORD}
      ENV: ${self:custom.${self:provider.stage}.ENV}

    timeout: 60
    memorySize: 256
    events:
      - http:
          path: /
          method: ANY
          cors: true
      - http:
          path: /{proxy+}
          method: ANY
          cors: true

